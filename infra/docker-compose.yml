version: "3.9"

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: scia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: scia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - scia_pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    container_name: scia-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  scia_pgdata:
